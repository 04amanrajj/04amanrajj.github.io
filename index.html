<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aman Raj</title>
  <meta name="description" content="linked-folio" />
  <meta name="author" content="amanraj" />
  <style>
    /* Premium Themed Redirection Modal Styles */
    .redirect-overlay {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.3s;
    }

    .redirect-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .redirect-modal {
      width: 100%;
      max-width: 400px;
      border-radius: 28px;
      padding: 28px;
      text-align: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      transform: scale(0.9) translateY(10px);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }

    .redirect-overlay.active .redirect-modal {
      transform: scale(1) translateY(0);
    }

    /* Light Theme (Default) */
    .redirect-modal {
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid rgba(0, 0, 0, 0.08);
      color: #1f2937;
    }

    .redirect-icon-container {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      background: #eff6ff;
      color: #2563eb;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }

    .redirect-title {
      font-size: 20px;
      font-weight: 700;
      margin: 0 0 10px;
      letter-spacing: -0.025em;
    }

    .redirect-desc {
      font-size: 14px;
      line-height: 1.5;
      color: #6b7280;
      margin: 0 0 24px;
    }

    .redirect-btn-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .redirect-btn-primary {
      background: #2563eb;
      color: #ffffff;
      border: none;
      padding: 14px 20px;
      border-radius: 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s active;
    }

    .redirect-btn-primary:hover {
      background: #1d4ed8;
    }

    .redirect-btn-primary:active {
      transform: scale(0.98);
    }

    .redirect-btn-secondary {
      background: transparent;
      color: #4b5563;
      border: 1px solid rgba(0, 0, 0, 0.1);
      padding: 14px 20px;
      border-radius: 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .redirect-btn-secondary:hover {
      background: rgba(0, 0, 0, 0.05);
      color: #1f2937;
    }

    /* Dark Theme Support */
    html.dark .redirect-modal {
      background: rgba(17, 24, 39, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #f9fafb;
    }

    html.dark .redirect-icon-container {
      background: rgba(37, 99, 235, 0.15);
      color: #60a5fa;
    }

    html.dark .redirect-desc {
      color: #9ca3af;
    }

    html.dark .redirect-btn-primary {
      background: #2563eb;
    }

    html.dark .redirect-btn-primary:hover {
      background: #3b82f6;
    }

    html.dark .redirect-btn-secondary {
      color: #d1d5db;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    html.dark .redirect-btn-secondary:hover {
      background: rgba(255, 255, 255, 0.05);
      color: #ffffff;
    }
  </style>
  <script>
    // Custom Styled redirection popup
    (function() {
      const MOBILE_BREAKPOINT = 768; // px

      function isMobileScreen() {
        return window.innerWidth < MOBILE_BREAKPOINT;
      }

      function createModalDOM(targetView) {
        // Overlay
        const overlay = document.createElement('div');
        overlay.className = 'redirect-overlay';
        overlay.id = 'custom-redirect-overlay';

        // Modal content details
        const isTargetMobile = targetView === 'mobile';
        const titleText = isTargetMobile ? 'Switch to Mobile View?' : 'Switch to Desktop View?';
        const descText = isTargetMobile 
          ? 'It looks like you are browsing on a mobile device. Switch to our optimized mobile experience for native navigation and layout.'
          : 'It looks like you are browsing on a larger display. Switch to the full-featured desktop version for best viewing.';
        const targetUrl = isTargetMobile ? '/mobile/' : '/';

        // Custom phone / monitor SVG icons
        const iconSvg = isTargetMobile 
          ? `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/></svg>`
          : `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="3" rx="2"/><line x1="8" x2="16" y1="21" y2="21"/><line x1="12" x2="12" y1="17" y2="21"/></svg>`;

        overlay.innerHTML = `
          <div class="redirect-modal">
            <div class="redirect-icon-container">
              ${iconSvg}
            </div>
            <h3 class="redirect-title">${titleText}</h3>
            <p class="redirect-desc">${descText}</p>
            <div class="redirect-btn-group">
              <button class="redirect-btn-primary" id="redirect-accept-btn">Switch Now</button>
              <button class="redirect-btn-secondary" id="redirect-cancel-btn">Stay Here</button>
            </div>
          </div>
        `;

        document.body.appendChild(overlay);

        // Bind interactive events
        const acceptBtn = document.getElementById('redirect-accept-btn');
        const cancelBtn = document.getElementById('redirect-cancel-btn');

        acceptBtn.addEventListener('click', function() {
          window.location.href = targetUrl;
        });

        cancelBtn.addEventListener('click', function() {
          overlay.classList.remove('active');
          setTimeout(() => overlay.remove(), 300);
        });

        // Trigger presentation animation
        setTimeout(() => overlay.classList.add('active'), 50);
      }

      window.addEventListener('load', function() {
        // Since this is the mobile branch, if accessed on a desktop/big screen, prompt redirect to desktop site
        if (!isMobileScreen()) {
          createModalDOM('desktop');
        }
      });
    })();
  </script>
</head>
